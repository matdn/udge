    <path d="M0 280H1200" stroke="#FFFFFF"/>
    <path d="M0 560H1200" stroke="#FFFFFF"/>
    <path d="M0 840H1200" stroke="#FFFFFF"/>
    <path d="M0 1120H1200" stroke="#FFFFFF"/>
    <path d="M240 0V1400" stroke="#FFFFFF"/>
    <path d="M480 0V1400" stroke="#FFFFFF"/>
    <path d="M720 0V1400" stroke="#FFFFFF"/>
    <path d="M960 0V1400" stroke="#FFFFFF"/>
  </g>
</svg>
